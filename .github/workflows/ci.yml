name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # `--frozen-lockfile` enforces lock parity; postinstall hook runs `prisma generate`.
        run: pnpm install --frozen-lockfile

      - name: Run vp check (format + lint + types)
        run: pnpm run check

  test-unit:
    name: test:unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage gate
        run: pnpm run test:unit:coverage

  test-integration:
    name: test:integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: permoney
          POSTGRES_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U permoney -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        env:
          BETTER_AUTH_SECRET: ${{ github.sha }}
          PERMONEY_TEST_ADMIN_DATABASE_URL: postgres://permoney@localhost:5433/postgres
          PERMONEY_TEST_ADMIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: pnpm run test:integration

  test-e2e:
    name: test:e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: permoney
          POSTGRES_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U permoney -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec vp exec playwright install --with-deps chromium

      - name: Run browser E2E tests
        env:
          BETTER_AUTH_SECRET: ${{ github.sha }}
          PERMONEY_TEST_ADMIN_DATABASE_URL: postgres://permoney@localhost:5433/postgres
          PERMONEY_TEST_ADMIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: pnpm run test:e2e

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Smoke-test build with a dummy DB URL so Prisma client generation succeeds.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
        run: pnpm build
