# SonarCloud / SonarQube project configuration for Permoney.
#
# Migrations are immutable, append-only Postgres SQL files. PL/pgSQL trigger
# functions reuse the same ERRCODE / table-name string literals across the
# file by design — that is a structural property of constraint triggers, not
# a code-quality smell. Sonar's default copy-paste detection treats those
# repeated literals as duplication and fails the quality gate. Exclude the
# entire migrations tree from CPD analysis; keep ordinary code under full
# Sonar coverage.
sonar.cpd.exclusions=prisma/migrations/**
